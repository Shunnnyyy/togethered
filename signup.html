<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TogetherEd Sign Up</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">TogetherEd</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        
        <a href="community.html">Community</a>
        <a href="tutors.html">Tutors</a>
        <a href="courses.html">Courses</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="contact.html">Contact</a>
    
        
        <a class="btn btn-outline" href="login.html">Log In</a>
        <a class="btn btn-primary" href="signup.html">Sign Up</a>
    
      </nav>
    </div>
  </header>
  
<main>
  <section class="page-hero">
    <div class="container center">
      <span class="eyebrow">Demo Access</span>
      <h1>Create an Account</h1>
      <p class="subtitle">Set up a demo student profile for TogetherEd.</p>
    </div>
  </section>
  <section class="section">
    <div class="form-card">
      <div class="form-row">
        <div class="form-group">
          <label>Preferred Name</label>
          <input id="signup-name" placeholder="Alex">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="signup-email" type="email" placeholder="alex@example.com">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Role</label>
          <select id="signup-role">
            <option>I need support</option>
            <option>I want to help others</option>
            <option>I can do both</option>
          </select>
        </div>
        <div class="form-group">
          <label>Grade</label>
          <select id="signup-grade">
            <option>Grade 9</option>
            <option>Grade 10</option>
            <option>Grade 11</option>
            <option>Grade 12</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>School</label>
        <input id="signup-school" placeholder="Ontario High School">
      </div>
      <a class="btn btn-primary" style="width:100%" href="#" id="signup-btn">Create Demo Account</a>
    </div>
  </section>
</main>

  <footer class="footer">
    <div class="container">© <span id="year"></span> TogetherEd · Learn Together. Grow Together.</div>
  </footer>
  <script src="app.js"></script>
</body>
</html>
